<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>信息填写</title>
  <link rel="stylesheet" href="./css/style.css">
</head>

<body class="form-page">
  <main class="form-shell">
    <header class="form-header">
      <h1>信息填写</h1>
      <p>填写学生基本信息后生成展示页面</p>
    </header>

    <form id="profileForm" class="profile-form" novalidate>
      <section class="form-section">
        <h2>基本信息</h2>
        <div class="form-grid">
          <label>
            <span>姓名</span>
            <input type="text" name="name" required autocomplete="name" value="测试姓名">
          </label>

          <label>
            <span>性别</span>
            <select name="gender" required>
              <option value="">请选择</option>
              <option value="男" selected>男</option>
              <option value="女">女</option>
            </select>
          </label>

          <label>
            <span>证件号码</span>
            <input type="text" name="idCard" required inputmode="text" maxlength="18" value="430000199901010000">
          </label>

          <label>
            <span>出生日期</span>
            <input type="date" name="birthDate" value="1999-01-01" readonly>
          </label>
        </div>
      </section>

      <section class="form-section">
        <h2>学籍信息</h2>
        <div class="form-grid">
          <label>
            <span>学校</span>
            <input type="text" name="school" readonly>
          </label>

          <label>
            <span>学历层次</span>
            <input type="text" name="educationLevel" readonly>
          </label>

          <label>
            <span>专业</span>
            <input type="text" name="major" readonly>
          </label>

          <label>
            <span>学习形式</span>
            <input type="text" name="studyType" readonly>
          </label>

          <label>
            <span>民族</span>
            <input type="text" name="nation" readonly>
          </label>

          <label>
            <span>学制</span>
            <input type="text" name="duration" readonly>
          </label>

          <label>
            <span>学院</span>
            <input type="text" name="college" readonly>
          </label>

          <label>
            <span>系所</span>
            <input type="text" name="department" readonly>
          </label>

          <label>
            <span>班级</span>
            <input type="text" name="className" required>
          </label>

          <label>
            <span>学籍状态</span>
            <input type="text" name="studentStatus" readonly>
          </label>

          <label>
            <span>学号</span>
            <input type="text" name="studentNo" value="S20260001" required>
          </label>

          <label>
            <span>入学日期</span>
            <input type="date" name="enrollmentDate" value="2026-09-01" required>
          </label>

          <label>
            <span>预计毕业日期</span>
            <input type="date" name="graduationDate" value="2031-06-30" required>
          </label>
        </div>
      </section>

      <section class="form-section">
        <h2>照片上传</h2>
        <div class="photo-upload">
          <label>
            <span>录取照片</span>
            <input type="file" id="admissionPhoto" name="admissionPhoto" accept="image/jpeg,image/png">
          </label>
          <div class="photo-preview" id="admissionPhotoPreview" hidden>
            <img alt="已上传录取照片预览">
            <p>已上传照片预览</p>
          </div>
          <p class="help-text">仅支持 JPG、JPEG、PNG；不超过 200KB；尺寸必须为 480 x 640 像素。</p>
        </div>
      </section>

      <p id="formError" class="error" role="alert"></p>

      <div class="form-actions">
        <button type="button" id="importButton" class="secondary-button">导入 TXT</button>
        <button type="button" id="exportButton" class="secondary-button">导出 TXT</button>
        <button type="submit" class="primary-button">生成页面</button>
        <input type="file" id="importFile" accept=".txt,text/plain,application/json" hidden>
      </div>

      <section id="wechatTransferPanel" class="wechat-transfer-panel" hidden>
        <h2>微信导入/导出</h2>
        <p class="help-text">微信内置浏览器不支持直接下载或选择 TXT 文件，请复制下方内容保存，或粘贴 TXT 内容后导入。</p>
        <textarea id="transferText" rows="10" placeholder="导出的 TXT 内容会显示在这里，也可以把 TXT 内容粘贴到这里导入。"></textarea>
        <div class="form-actions compact-actions">
          <button type="button" id="copyTransferButton" class="secondary-button">复制内容</button>
          <button type="button" id="pasteImportButton" class="primary-button">导入文本</button>
        </div>
      </section>
    </form>
  </main>

  <script src="./js/form.js"></script>
</body>

</html>
